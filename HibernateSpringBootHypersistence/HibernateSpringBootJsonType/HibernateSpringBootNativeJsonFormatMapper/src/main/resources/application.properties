spring.datasource.url=jdbc:mysql://localhost:3306/bookstoredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Give the native JSON feature a custom Jackson FormatMapper (snake_case naming).
# This is the native counterpart of hypersistence.utils.jackson.object.mapper.
spring.jpa.properties.hibernate.type.json_format_mapper=com.bookstore.forum.config.SnakeCaseJsonFormatMapper
