spring.datasource.url=jdbc:mysql://localhost:3306/bookstoredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Give JsonType a custom Jackson ObjectMapper (snake_case naming). This is the
# JsonType-specific counterpart to Hibernate's global hibernate.type.json_format_mapper.
spring.jpa.properties.hypersistence.utils.jackson.object.mapper=com.bookstore.forum.config.SnakeCaseObjectMapperSupplier
