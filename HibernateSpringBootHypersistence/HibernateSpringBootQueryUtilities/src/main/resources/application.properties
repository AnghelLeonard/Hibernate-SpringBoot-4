spring.datasource.url=jdbc:mysql://localhost:3306/bookstoredb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Register both debugging StatementInspectors through one no-arg composite.
spring.jpa.properties.hibernate.session_factory.statement_inspector=com.bookstore.forum.config.CompositeStatementInspector

# QueryStackTraceLogger only logs when its logger is at DEBUG.
logging.level.io.hypersistence.utils.hibernate.query.QueryStackTraceLogger=DEBUG
