spring.datasource.url=jdbc:postgresql://localhost:5432/bookstoredb
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Create the citext extension BEFORE Hibernate generates native_tag (whose name
# column is declared as citext). With defer-datasource-initialization left at its
# default (false), schema.sql runs before the EntityManagerFactory is built.
spring.sql.init.mode=always
