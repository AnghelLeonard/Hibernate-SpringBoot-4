spring.datasource.url=jdbc:postgresql://localhost:5432/bookstoredb
spring.datasource.username=postgres
spring.datasource.password=root

# Deliberately left as the "before" configuration:
#   * ddl-auto=create asks Hibernate to generate the schema -> SchemaGenerationEvent
#   * show-sql prints statements through System.out -> ConsoleStatementLoggingEvent
#   * no hibernate.jdbc.batch_size -> JdbcBatchSizeEvent
#   * autocommit is not disabled on the pool, and
#     hibernate.connection.provider_disables_autocommit is not set
#     -> SkipAutoCommitCheckEvent
# Every one of these is fixed in the next item.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
