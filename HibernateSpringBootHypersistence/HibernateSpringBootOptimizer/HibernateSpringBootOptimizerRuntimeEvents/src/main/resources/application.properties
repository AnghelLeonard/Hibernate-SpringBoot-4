spring.datasource.url=jdbc:postgresql://localhost:5432/bookstoredb?reWriteBatchedInserts=true
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.hikari.auto-commit=false

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=debug

# The mapping and the configuration are the ones we fixed in the previous item,
# so the startup scan is clean and every event in this module is a RUNTIME one.
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=4096

# Runtime threshold: a session that stays open longer than this is reported.
# 100 ms is deliberately aggressive so the example is quick and deterministic;
# in a real application you would set it to whatever "too long" means for your
# workload. Set it too low and ordinary requests start reporting themselves.
spring.jpa.properties.hypersistence.session.timeout_millis=100
