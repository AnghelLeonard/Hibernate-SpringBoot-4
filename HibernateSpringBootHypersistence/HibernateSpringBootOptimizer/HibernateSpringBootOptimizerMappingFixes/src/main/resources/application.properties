# reWriteBatchedInserts lets PostgreSQL collapse a JDBC batch into a single
# multi-value INSERT -> silences JdbcBatchToBulkInsertEvent.
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstoredb?reWriteBatchedInserts=true
spring.datasource.username=postgres
spring.datasource.password=root

# The pool really does disable autocommit, so Hibernate may be told to stop
# checking for it and to delay connection acquisition until it is needed.
# Both halves are required: the property alone would be a lie.
spring.datasource.hikari.auto-commit=false
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# The schema is owned by a migration script, not by Hibernate.
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.jpa.open-in-view=false

# No show-sql: statements go through a logger, as the event recommends.
logging.level.org.hibernate.SQL=debug

spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=4096
