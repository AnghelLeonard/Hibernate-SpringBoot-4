app.datasource.url=jdbc:mysql://localhost:3306/numberdb?createDatabaseIfNotExist=true
app.datasource.username=root
app.datasource.password=root

spring.jpa.generate-dll=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

spring.sql.init.mode=always
spring.sql.init.platform=mysql

app.datasource.max-wait=12000
app.datasource.initial-size=5
app.datasource.max-active=5
app.datasource.min-idle=5
app.datasource.max-idle=5
app.datasource.maximum-pool-size=25
# enable auto-commit (disabled by default)
app.datasource.default-auto-commit=false
# more settings can be added as app.datasource.*

# disable auto-commit
app.datasource.auto-commit=false
# more settings can be added as app.datasource.*